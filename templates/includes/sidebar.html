<div class="sidebar-nav">
  {% if user.is_authenticated %}
    <div class="mb-4 p-3 text-center" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px;">
      <small class="d-block text-muted">Worker:</small>
      <span class="fw-bold text-light">{{ user.username }}</span>
    </div>

    <form action="{% url 'logout' %}" method="post" class="mb-4">
      {% csrf_token %}
      <button type="submit" class="btn btn-outline-danger w-100 py-2">
        <i class="fas fa-power-off"></i> Logout
      </button>
    </form>
  {% else %}
    <div class="d-grid gap-2 mb-4">
      <a href="{% url 'login' %}" class="btn btn-light">Login</a>
      <a href="/signup/" class="btn btn-primary">Sign Up</a>
    </div>
  {% endif %}

  <ul class="list-group flex-column gap-2"> <li class="list-group-item">
      <a href="{% url 'manager:index' %}"><i class="fas fa-home me-2"></i>Home</a>
    </li>
    <li class="list-group-item">
      <a href="{% url 'manager:task-list' %}"><i class="fas fa-tasks me-2"></i>Tasks</a>
    </li>
    <li class="list-group-item">
      <a href="{% url 'manager:worker-list' %}"><i class="fas fa-users me-2"></i>Workers</a>
    </li>
    <li class="list-group-item">
      <a href="{% url 'manager:task-type-list' %}"><i class="fas fa-tag me-2"></i>Task types</a>
    </li>
    <li class="list-group-item">
      <a href="{% url 'manager:position-list' %}"><i class="fas fa-briefcase me-2"></i>Positions</a>
    </li>
  </ul>
</div>
