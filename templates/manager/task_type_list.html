{% extends "base.html" %}

{% block title %}
	<title>Task Types</title>
{% endblock %}

{% block content %}
  <h1>All Tasks types:</h1>
    {% if task_type_list %}
      {% for task_type in task_type_list %}
      	<ul>
          <li><a href="#">{{ task_type.name }}</a></li>
        </ul>
      {% endfor %}
    {% else %}
      <p>There are no tasks types in the service.</p>
    {% endif %}
{% endblock %}
