{% extends "base.html" %}
{% load crispy_forms_filters %}

{%  block content %}
  {% if form.errors %}
  	<p style="color: red">Invalid credentials</p>
  {% endif %}

  <form action="{% url 'login' %}" method="post">
    {% csrf_token %}
    <h1>Login:</h1>
    {{ form|crispy }}
    <input class="btn btn-primary" type="submit" value="Submit">
    <input type="hidden" name="next" value="{{ next }}">
  </form>
{% endblock %}
