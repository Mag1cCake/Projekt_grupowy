{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-10 col-lg-8"> <div class="p-4">
      <h2 class="text-center mb-4 text-light">Create Account</h2>
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-primary btn-lg mt-3">Register</button> </div>
      </form>
      <div class="text-center mt-3">
        <p class="text-muted">Already have an account? <a href="{% url 'login' %}" class="text-info">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
